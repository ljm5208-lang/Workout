<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F7FF; --surface:#FFFFFF; --surface2:#F0F3FF; --border:#E4E8F7;
  --primary:#5B6EF5; --primary-light:#EEF0FE; --primary-dark:#3D50D4;
  --orange:#FF7043; --orange-light:#FFF0EC;
  --green:#22C55E; --green-light:#EDFAF3;
  --yellow:#F59E0B; --yellow-light:#FFFBEB;
  --red:#EF4444; --red-light:#FEF2F2;
  --blue:#3B82F6; --blue-light:#EFF6FF;
  --text:#1A1D2E; --text2:#5A5F7D; --text3:#9CA3AF;
  --shadow:0 4px 20px rgba(91,110,245,0.10);
  --shadow-sm:0 2px 8px rgba(91,110,245,0.08);
  --shadow-lg:0 8px 32px rgba(91,110,245,0.15);
  --radius:16px; --radius-sm:10px; --radius-xs:7px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Nunito',sans-serif;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;height:100%;
}

/* ── HEADER ── */
.app-header{background:var(--surface);padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow-sm);z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(135deg,var(--primary),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-stats{display:flex;gap:7px;}
.hstat{display:flex;flex-direction:column;align-items:center;background:var(--primary-light);border-radius:8px;padding:4px 9px;}
.hstat-val{font-size:12px;font-weight:800;color:var(--primary);line-height:1;}
.hstat-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}

/* ══════════════════════════════════════
   FIXED TIMER  (운동탭 전용 고정 영역)
   ══════════════════════════════════════ */
.fixed-timer{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  padding:14px 16px 10px;flex-shrink:0;z-index:9;
  display:none;
}
.fixed-timer.visible{display:block;}

/* 타이머 메인 행: 시간 + 버튼을 한 줄에 */
.timer-main-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.timer-left{display:flex;flex-direction:column;}
.timer-label-sm{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:2px;font-family:'DM Mono',monospace;margin-bottom:2px;}
/* ★ 타이머 숫자 크게 */
.timer-display{
  font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;
  color:#fff;line-height:1;
}
.timer-display.warning{color:#FFD700;}
.timer-display.done{color:#7FFFB0;}
@keyframes tpulse{0%,100%{opacity:1}50%{opacity:0.5}}
.timer-display.running{animation:tpulse 1.6s infinite;}

/* ★ 버튼 오른쪽 배치, 크게 */
.timer-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.timer-main-btns{display:flex;gap:8px;align-items:center;}
.t-btn{
  border:none;border-radius:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;
  transition:all 0.15s;min-height:48px;
  display:flex;align-items:center;justify-content:center;
}
/* 시작/정지 버튼 — 크게 */
.t-btn-start{background:rgba(255,255,255,0.25);color:#fff;font-size:16px;padding:0 22px;min-width:90px;}
.t-btn-start:active{background:rgba(255,255,255,0.42);}
.t-btn-stop{background:#FF4444;color:#fff;font-size:16px;padding:0 22px;min-width:90px;}
.t-btn-stop:active{filter:brightness(0.85);}
/* 리셋 버튼 — 크게 */
.t-btn-reset{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);font-size:22px;width:48px;}
.t-btn-reset:active{background:rgba(255,255,255,0.28);}

/* 프리셋 행 */
.timer-presets-row{display:flex;gap:5px;margin-top:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.timer-presets-row::-webkit-scrollbar{display:none;}
.preset-chip{
  flex-shrink:0;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);
  color:rgba(255,255,255,0.9);padding:5px 12px;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;
}
.preset-chip.active{background:rgba(255,255,255,0.38);border-color:#fff;color:#fff;}
.preset-chip:active{background:rgba(255,255,255,0.42);}
.custom-time-inp{
  flex-shrink:0;background:rgba(255,255,255,0.1);border:1.5px dashed rgba(255,255,255,0.4);
  color:#fff;padding:5px 8px;border-radius:20px;
  font-size:11px;font-family:'DM Mono',monospace;text-align:center;width:68px;
}
.custom-time-inp::placeholder{color:rgba(255,255,255,0.4);}
.custom-time-inp:focus{outline:none;border-color:rgba(255,255,255,0.9);}

/* ── SCROLLABLE CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;}
.page.active{display:block;}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);flex-shrink:0;box-shadow:0 -4px 20px rgba(91,110,245,0.07);z-index:10;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;border:none;background:none;font-family:'Nunito',sans-serif;}
.nav-icon-wrap{padding:4px 14px;border-radius:10px;transition:all 0.2s;}
.nav-icon{font-size:20px;line-height:1;display:block;}
.nav-label{font-size:10px;font-weight:700;color:var(--text3);}
.nav-item.active .nav-icon-wrap{background:var(--primary-light);}
.nav-item.active .nav-label{color:var(--primary);}

/* ── CALENDAR ── */
.calendar-card{margin:14px 14px 0;background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cal-nav{background:var(--primary-light);border:none;color:var(--primary);width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:800;}
.cal-nav:active{background:var(--primary);color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{text-align:center;font-size:9px;font-weight:700;color:var(--text3);padding:3px 0;font-family:'DM Mono',monospace;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:12px;font-weight:700;border-radius:9px;cursor:pointer;transition:all 0.15s;color:var(--text2);position:relative;gap:1px;}
.cal-day:active{transform:scale(0.88);}
.cal-day.today{background:var(--primary-light);color:var(--primary);box-shadow:0 0 0 2px var(--primary);}
.cal-day.selected{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:var(--shadow);}
.cal-day-dot{width:4px;height:4px;border-radius:50%;background:var(--orange);}
.cal-day.done-workout{background:linear-gradient(135deg,#22C55E,#16A34A)!important;color:#fff!important;box-shadow:0 2px 8px rgba(34,197,94,0.3)!important;}
.cal-day.done-workout .cal-day-dot{background:rgba(255,255,255,0.7);}
.cal-day.empty{cursor:default;}
.cal-legend{display:flex;gap:10px;margin-top:10px;padding-top:9px;border-top:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);font-weight:700;}
.legend-dot{width:11px;height:11px;border-radius:3px;}

/* ── WEEKLY STRIP ── */
.weekly-strip{display:flex;gap:6px;padding:10px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.weekly-strip::-webkit-scrollbar{display:none;}
.week-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;min-width:48px;box-shadow:var(--shadow-sm);transition:all 0.2s;}
.week-chip.clickable{cursor:pointer;border-color:rgba(91,110,245,0.28);}
.week-chip.clickable:active{transform:scale(0.94);background:var(--primary-light);}
.week-day{font-size:9px;font-weight:800;color:var(--text3);font-family:'DM Mono',monospace;}
.week-tag{font-size:8px;font-weight:700;color:var(--primary);text-align:center;white-space:pre-line;line-height:1.3;}
.week-chip.rest-chip .week-tag{color:var(--text3);}

/* ── SECTION HEADER ── */
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 7px;}
.section-title{font-size:15px;font-weight:800;color:var(--text);}
.section-action{background:var(--primary-light);border:none;color:var(--primary);font-size:12px;font-weight:700;padding:6px 13px;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;min-height:32px;}
.section-action:active{background:var(--primary);color:#fff;}

/* ── ROUTINE LIST ── */
.routine-list{padding:0 14px;display:flex;flex-direction:column;gap:9px;}
.routine-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.routine-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--primary),var(--orange));border-radius:4px 0 0 4px;}
.routine-card:active{transform:scale(0.98);}
.routine-card.active-card{border-color:var(--primary);background:var(--primary-light);}
.routine-card-top{display:flex;align-items:flex-start;justify-content:space-between;}
.routine-name{font-size:14px;font-weight:800;color:var(--text);}
.routine-tag{font-size:9px;font-weight:700;background:var(--primary-light);color:var(--primary);padding:3px 8px;border-radius:20px;font-family:'DM Mono',monospace;}
.routine-card.active-card .routine-tag{background:var(--primary);color:#fff;}
.routine-exercises{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;line-height:1.5;}
.routine-meta{font-size:10px;color:var(--blue);font-weight:700;margin-top:3px;}
.routine-del-btn{background:var(--red-light);border:none;color:var(--red);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;}
.routine-del-btn:active{background:var(--red);color:#fff;}

/* ══════════════════════════════════════
   WORKOUT HERO
   ══════════════════════════════════════ */
.workout-hero{
  margin:12px 14px 0;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-lg);color:#fff;
  position:relative;overflow:hidden;
}
.workout-hero::after{content:'';position:absolute;right:-20px;top:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.06);}
.workout-hero-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;}
.workout-hero-date{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px;font-weight:600;}
.workout-hero-meta{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap;}
.hero-badge{background:rgba(255,255,255,0.18);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.workout-tip{background:rgba(255,255,255,0.12);border-radius:var(--radius-sm);padding:8px 11px;font-size:11px;color:rgba(255,255,255,0.9);margin-top:9px;line-height:1.6;font-weight:600;}
.progress-section{margin-top:10px;}
.progress-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.progress-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:700;}
.progress-val{font-size:11px;color:#fff;font-weight:800;}
.progress-track{height:6px;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(255,255,255,0.9),rgba(255,255,255,0.55));border-radius:10px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

/* ★ 워크아웃 컨트롤 버튼들 — 전체 너비, 터치 영역 충분히 */
.workout-ctrl-row{
  display:flex;gap:8px;margin-top:12px;
}
.wctrl-btn{
  flex:1;border:none;border-radius:var(--radius-sm);
  font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
  cursor:pointer;transition:all 0.2s;
  padding:13px 10px;min-height:48px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.wctrl-start{background:rgba(255,255,255,0.25);color:#fff;border:2px solid rgba(255,255,255,0.5);}
.wctrl-start:active{background:rgba(255,255,255,0.4);}
.wctrl-pause{background:rgba(255,200,0,0.3);color:#FFE566;border:2px solid rgba(255,200,0,0.5);}
.wctrl-pause:active{background:rgba(255,200,0,0.5);}
.wctrl-resume{background:rgba(100,255,150,0.25);color:#7FFFB0;border:2px solid rgba(100,255,150,0.5);}
.wctrl-resume:active{background:rgba(100,255,150,0.4);}
.wctrl-stop{background:rgba(255,68,68,0.25);color:#FF9090;border:2px solid rgba(255,68,68,0.4);}
.wctrl-stop:active{background:rgba(255,68,68,0.45);}
.wctrl-done{background:rgba(34,197,94,0.3);color:#7FFFB0;border:2px solid rgba(34,197,94,0.6);}
.wctrl-done:active{background:rgba(34,197,94,0.5);}

/* 일시정지 배너 */
.paused-banner{
  background:rgba(255,200,0,0.18);border:1.5px solid rgba(255,200,0,0.4);
  border-radius:var(--radius-xs);padding:8px 12px;
  font-size:12px;font-weight:700;color:#FFE566;
  text-align:center;margin-top:10px;
}

/* ══════════════════════════════════════
   운동 시작 전 무게/세트 편집 (pre-edit)
   ══════════════════════════════════════ */
.pre-edit-banner{
  background:var(--yellow-light);border:1.5px solid rgba(245,158,11,0.3);
  border-radius:var(--radius-sm);padding:9px 12px;
  font-size:12px;font-weight:700;color:#92400E;
  margin:10px 14px 0;text-align:center;
}
/* 시작 전 세트 행: 무게·횟수 편집 가능, 삭제 버튼 포함 */
.pre-set-row{display:grid;grid-template-columns:34px 1fr 1fr 1fr 36px;gap:4px;align-items:center;padding:4px 0;}
.pre-del-btn{background:var(--red-light);border:none;color:var(--red);width:30px;height:30px;border-radius:var(--radius-xs);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.pre-del-btn:active{background:var(--red);color:#fff;}

/* ── PHASE LABELS ── */
.phase-lbl{display:flex;align-items:center;gap:7px;margin:14px 14px 7px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.phase-lbl::after{content:'';flex:1;height:1.5px;border-radius:2px;}
.lbl-warmup{color:#F59E0B;}.lbl-warmup::after{background:linear-gradient(90deg,#F59E0B30,transparent);}
.lbl-main{color:var(--primary);}.lbl-main::after{background:linear-gradient(90deg,#5B6EF530,transparent);}
.lbl-cool{color:var(--blue);}.lbl-cool::after{background:linear-gradient(90deg,#3B82F630,transparent);}
.lbl-cardio{color:var(--red);}.lbl-cardio::after{background:linear-gradient(90deg,#EF444430,transparent);}

/* ── EXERCISE CARDS ── */
.ex-cards{padding:0 14px;display:flex;flex-direction:column;gap:9px;}
.ex-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;border:1.5px solid var(--border);transition:all 0.3s;}
.ex-card.done-card{border-color:var(--green);background:var(--green-light);opacity:0.72;}
.ex-card-header{padding:12px 13px 10px;}
.ex-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;}
.ex-name{font-size:13px;font-weight:800;color:var(--text);flex:1;line-height:1.3;}
.done-chip{background:var(--green);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;flex-shrink:0;white-space:nowrap;}
.ex-meta{font-size:10px;color:var(--text3);font-weight:700;font-family:'DM Mono',monospace;margin-top:2px;}
.ex-focus{background:var(--yellow-light);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-xs);padding:6px 9px;margin-top:7px;display:flex;gap:5px;align-items:flex-start;}
.focus-icon{font-size:11px;flex-shrink:0;margin-top:1px;}
.focus-text{font-size:11px;color:#92400E;font-weight:600;line-height:1.5;}
.ex-note{background:var(--blue-light);border:1px solid rgba(59,130,246,0.15);border-radius:var(--radius-xs);padding:5px 9px;margin-top:5px;font-size:11px;color:#1D4ED8;font-weight:600;line-height:1.5;}

/* ── SETS TABLE ── */
.sets-body{padding:0 13px 11px;}
.sets-hd{display:grid;grid-template-columns:34px 1fr 1fr 1fr 46px;gap:4px;font-size:9px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;padding-bottom:6px;border-bottom:1.5px solid var(--border);margin-bottom:4px;text-align:center;}
/* 시작 전 헤더는 삭제 컬럼 추가 */
.sets-hd-pre{display:grid;grid-template-columns:34px 1fr 1fr 1fr 36px;gap:4px;font-size:9px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;padding-bottom:6px;border-bottom:1.5px solid var(--border);margin-bottom:4px;text-align:center;}
.set-row{display:grid;grid-template-columns:34px 1fr 1fr 1fr 46px;gap:4px;align-items:center;padding:4px 0;}
.set-row.done-set{opacity:0.38;}
.set-num{font-size:11px;font-weight:800;color:var(--text3);text-align:center;font-family:'DM Mono',monospace;}
.set-inp{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:7px 3px;border-radius:var(--radius-xs);font-size:13px;font-weight:700;font-family:'DM Mono',monospace;text-align:center;width:100%;-webkit-appearance:none;}
.set-inp:focus{outline:none;border-color:var(--primary);background:var(--primary-light);}
.set-inp:disabled{opacity:0.45;background:var(--border);}
.vol-cell{font-size:11px;font-weight:700;color:var(--text3);text-align:center;font-family:'DM Mono',monospace;}
.check-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text3);width:100%;aspect-ratio:1;border-radius:var(--radius-xs);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.check-btn:active{transform:scale(0.85);}
.check-btn.checked{background:var(--green-light);border-color:var(--green);color:var(--green);}
.check-btn:disabled{opacity:0.28;cursor:not-allowed;}
.add-set-btn{width:100%;background:none;border:1.5px dashed var(--border);color:var(--text3);padding:8px;border-radius:var(--radius-xs);font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;transition:all 0.15s;}
.add-set-btn:active{border-color:var(--primary);color:var(--primary);}
.timed-body{padding:9px 13px 11px;display:flex;align-items:center;gap:9px;}
.timed-info{flex:1;font-size:12px;font-weight:700;color:var(--text2);font-family:'DM Mono',monospace;}
.timed-check-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text3);padding:10px 16px;border-radius:var(--radius-xs);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;white-space:nowrap;min-height:44px;}
.timed-check-btn:active{transform:scale(0.93);}
.timed-check-btn.checked{background:var(--green-light);border-color:var(--green);color:var(--green);}
.timed-check-btn:disabled{opacity:0.28;cursor:not-allowed;}

/* ── EMPTY ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;gap:9px;padding:20px;}
.empty-icon{font-size:48px;opacity:0.3;}
.empty-text{font-size:13px;font-weight:700;color:var(--text3);text-align:center;line-height:1.7;}

/* ══════════════════════════════════════
   HISTORY — 볼륨/삭제 겹침 수정
   ══════════════════════════════════════ */
.history-list{padding:0 14px;display:flex;flex-direction:column;gap:9px;}
.history-card{background:var(--surface);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
.history-card.full-done{border-left:4px solid var(--green);}
.history-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.history-top-left{flex:1;min-width:0;}
.history-name{font-size:14px;font-weight:800;}
.history-meta{font-size:10px;color:var(--text3);font-weight:700;margin-top:2px;font-family:'DM Mono',monospace;}
.history-top-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.history-vol{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;background:linear-gradient(135deg,var(--primary),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.history-sets{font-size:10px;color:var(--text3);font-weight:700;font-family:'DM Mono',monospace;}
/* ★ 삭제 버튼을 오른쪽 컬럼 최하단에 분리 배치 */
.history-del-btn{background:var(--red-light);border:none;color:var(--red);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap;}
.history-del-btn:active{background:var(--red);color:#fff;}
.history-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.history-tag{font-size:10px;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--text3);padding:2px 7px;border-radius:20px;}

/* ── INBODY PAGE ── */
.inbody-summary{margin:12px 14px 0;display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.ib-stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
.ib-stat-label{font-size:10px;font-weight:700;color:var(--text3);font-family:'DM Mono',monospace;}
.ib-stat-val{font-size:24px;font-weight:900;margin-top:2px;line-height:1;}
.ib-stat-unit{font-size:11px;font-weight:700;color:var(--text3);}
.ib-stat-change{font-size:10px;font-weight:700;margin-top:2px;}
.ib-stat-change.pos{color:var(--green);}
.ib-stat-change.neg{color:var(--red);}
.ib-stat-change.neu{color:var(--text3);}
.inbody-reminder{margin:10px 14px 0;background:linear-gradient(135deg,#FFF7ED,#FFF0DC);border:1.5px solid rgba(245,158,11,0.3);border-radius:var(--radius-sm);padding:11px 14px;display:flex;align-items:flex-start;gap:9px;}
.reminder-icon{font-size:20px;flex-shrink:0;}
.reminder-text{font-size:12px;font-weight:700;color:#92400E;line-height:1.6;}
.reminder-btn{background:#F59E0B;border:none;color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;flex-shrink:0;align-self:center;margin-left:auto;}
.reminder-btn:active{filter:brightness(0.9);}
.chart-card{margin:10px 14px 0;background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);}
.chart-title{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.chart-tabs{display:flex;gap:5px;flex-wrap:wrap;}
.chart-tab{background:var(--bg);border:1.5px solid var(--border);color:var(--text3);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.chart-tab.active{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
canvas{width:100%!important;display:block;}
.inbody-log-list{padding:0 14px;display:flex;flex-direction:column;gap:8px;margin-top:2px;}
.inbody-log-card{background:var(--surface);border-radius:var(--radius-sm);padding:11px 13px;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);position:relative;}
.inbody-log-date{font-size:11px;font-weight:800;color:var(--text3);font-family:'DM Mono',monospace;}
.inbody-log-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:7px;}
.inbody-log-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.ilog-label{font-size:8px;color:var(--text3);font-weight:700;font-family:'DM Mono',monospace;}
.ilog-val{font-size:13px;font-weight:800;}
.inbody-log-del{position:absolute;top:9px;right:9px;background:var(--red-light);border:none;color:var(--red);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.inbody-log-del:active{background:var(--red);color:#fff;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,40,0.58);z-index:500;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:18px 18px env(safe-area-inset-bottom,18px);width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(91,110,245,0.14);}
.modal-handle{width:34px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:14px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:10px;font-weight:800;color:var(--text2);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:11px 13px;border-radius:var(--radius-sm);font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;}
.form-input:focus{outline:none;border-color:var(--primary);background:var(--primary-light);}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.tag-chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;}
.tag-chip.sel{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.ex-input-row{display:grid;grid-template-columns:1fr 56px 56px 56px 30px;gap:4px;align-items:center;margin-bottom:6px;}
.mini-inp{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:8px 4px;border-radius:var(--radius-xs);font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;text-align:center;width:100%;}
.mini-inp:focus{outline:none;border-color:var(--primary);}
.del-row-btn{background:var(--red-light);border:none;color:var(--red);width:27px;height:27px;border-radius:var(--radius-xs);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.modal-actions{display:flex;gap:7px;margin-top:16px;}
.btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;border:none;min-height:48px;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:var(--shadow);}
.btn-primary:active{filter:brightness(0.93);}
.btn-secondary{background:var(--bg);color:var(--text2);border:1.5px solid var(--border);}
.ib-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* ── COMPLETE ── */
.complete-overlay{position:fixed;inset:0;background:rgba(10,15,40,0.9);z-index:600;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:11px;backdrop-filter:blur(12px);padding:20px;}
.complete-overlay.hidden{display:none;}
.complete-emoji{font-size:68px;animation:bounceIn 0.5s ease;}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.complete-title{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:4px;background:linear-gradient(135deg,#FFD700,var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.complete-card{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);padding:14px 22px;text-align:center;width:100%;max-width:310px;}
.complete-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:7px;}
.complete-stats{display:flex;gap:20px;justify-content:center;}
.cstat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.cstat-val{font-size:24px;font-weight:900;color:#fff;}
.cstat-label{font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;}
.complete-sub{color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;text-align:center;}
.complete-btn{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;padding:14px 38px;border-radius:var(--radius);font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:var(--shadow-lg);}
.complete-btn:active{filter:brightness(0.93);}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:700;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-top">
    <div class="logo">LIFT</div>
    <div class="header-stats">
      <div class="hstat"><span class="hstat-val" id="hWeight">76kg</span><span class="hstat-label">체중</span></div>
      <div class="hstat"><span class="hstat-val" id="hFat">27.9%</span><span class="hstat-label">체지방</span></div>
      <div class="hstat"><span class="hstat-val" id="hMuscle">30kg</span><span class="hstat-label">근육량</span></div>
    </div>
  </div>
</div>

<!-- ★ FIXED TIMER — 운동 탭 전용 고정 -->
<div class="fixed-timer" id="fixedTimer">
  <div class="timer-main-row">
    <div class="timer-left">
      <div class="timer-label-sm">REST TIMER</div>
      <div class="timer-display" id="timerDisplay">01:00</div>
    </div>
    <div class="timer-right">
      <div class="timer-main-btns">
        <button class="t-btn t-btn-reset" onclick="resetTimer()">↺</button>
        <button class="t-btn t-btn-start" id="timerToggleBtn" onclick="toggleTimer()">시작</button>
      </div>
    </div>
  </div>
  <div class="timer-presets-row">
    <button class="preset-chip" onclick="setPreset(30)">30초</button>
    <button class="preset-chip" onclick="setPreset(45)">45초</button>
    <button class="preset-chip active" onclick="setPreset(60)">1분</button>
    <button class="preset-chip" onclick="setPreset(90)">1:30</button>
    <button class="preset-chip" onclick="setPreset(120)">2분</button>
    <button class="preset-chip" onclick="setPreset(180)">3분</button>
    <input class="custom-time-inp" id="customTimeInp" type="text" placeholder="직접입력" onchange="setCustomTime(this.value)">
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ══ HOME ══ -->
  <div class="page active" id="page-home">
    <div class="calendar-card">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark))"></div>선택</div>
        <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#22C55E,#16A34A)"></div>완료</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--primary-light);box-shadow:0 0 0 2px var(--primary)"></div>오늘</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange);border-radius:50%;width:8px;height:8px;margin:1.5px"></div>기록</div>
      </div>
    </div>
    <div class="section-hd" style="padding-bottom:3px;"><div class="section-title">🗓 주간 분할</div></div>
    <div class="weekly-strip" id="weeklyStrip"></div>
    <div class="section-hd">
      <div class="section-title">💪 루틴 선택</div>
      <button class="section-action" onclick="openRoutineModal()">+ 추가</button>
    </div>
    <div class="routine-list" id="routineList"></div>
    <div style="height:18px"></div>
  </div>

  <!-- ══ WORKOUT ══ -->
  <div class="page" id="page-workout">
    <div id="workoutArea"></div>
    <div style="height:18px"></div>
  </div>

  <!-- ══ HISTORY ══ -->
  <div class="page" id="page-history">
    <div class="section-hd" style="padding-top:18px;"><div class="section-title">📋 운동 기록</div></div>
    <div class="history-list" id="historyList"></div>
    <div style="height:18px"></div>
  </div>

  <!-- ══ INBODY ══ -->
  <div class="page" id="page-inbody">
    <div class="inbody-reminder" id="inbodyReminder" style="display:none;">
      <div class="reminder-icon">📊</div>
      <div class="reminder-text">매주 월요일 인바디 측정일이에요!<br>오늘 수치를 기록해 주세요.</div>
      <button class="reminder-btn" onclick="openInbodyModal()">기록하기</button>
    </div>
    <div class="inbody-summary" id="inbodySummary"></div>
    <div class="chart-card">
      <div class="chart-title">
        <span>📈 변화 추이</span>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('weight',this)">체중</button>
          <button class="chart-tab" onclick="switchChart('fat',this)">체지방%</button>
          <button class="chart-tab" onclick="switchChart('muscle',this)">근육량</button>
          <button class="chart-tab" onclick="switchChart('fatkg',this)">체지방량</button>
        </div>
      </div>
      <canvas id="inbodyChart" height="180"></canvas>
      <div id="chartEmpty" style="text-align:center;color:var(--text3);font-size:12px;font-weight:700;padding:30px 0;display:none;">기록이 2개 이상 있어야 그래프가 표시돼요</div>
    </div>
    <div class="section-hd">
      <div class="section-title">📝 측정 기록</div>
      <button class="section-action" onclick="openInbodyModal()">+ 기록</button>
    </div>
    <div class="inbody-log-list" id="inbodyLogList"></div>
    <div style="height:18px"></div>
  </div>

</div><!-- /content -->

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="switchTab('home')">
    <div class="nav-icon-wrap"><span class="nav-icon">🏠</span></div>
    <span class="nav-label">홈</span>
  </button>
  <button class="nav-item" id="nav-workout" onclick="switchTab('workout')">
    <div class="nav-icon-wrap"><span class="nav-icon">🏋️</span></div>
    <span class="nav-label">운동</span>
  </button>
  <button class="nav-item" id="nav-history" onclick="switchTab('history')">
    <div class="nav-icon-wrap"><span class="nav-icon">📊</span></div>
    <span class="nav-label">기록</span>
  </button>
  <button class="nav-item" id="nav-inbody" onclick="switchTab('inbody')">
    <div class="nav-icon-wrap"><span class="nav-icon">🧬</span></div>
    <span class="nav-label">인바디</span>
  </button>
</div>

<!-- ROUTINE MODAL -->
<div class="modal-overlay hidden" id="routineModal" onclick="if(event.target===this)closeRoutineModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">새 루틴 추가</div>
    <div class="form-group">
      <label class="form-label">루틴 이름</label>
      <input class="form-input" id="routineName" placeholder="예: 가슴 + 삼두">
    </div>
    <div class="form-group">
      <label class="form-label">태그</label>
      <div class="tag-row" id="tagRow">
        <div class="tag-chip sel" data-tag="가슴" onclick="toggleTag(this)">가슴</div>
        <div class="tag-chip" data-tag="하체" onclick="toggleTag(this)">하체</div>
        <div class="tag-chip" data-tag="어깨" onclick="toggleTag(this)">어깨</div>
        <div class="tag-chip" data-tag="등" onclick="toggleTag(this)">등</div>
        <div class="tag-chip" data-tag="팔" onclick="toggleTag(this)">팔</div>
        <div class="tag-chip" data-tag="코어" onclick="toggleTag(this)">코어</div>
        <div class="tag-chip" data-tag="전신" onclick="toggleTag(this)">전신</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">종목 (이름 / 무게 / 횟수 / 세트)</label>
      <div id="exInputList"></div>
      <button class="add-set-btn" onclick="addExInput()" style="margin-top:5px;">+ 종목 추가</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeRoutineModal()">취소</button>
      <button class="btn btn-primary" onclick="saveRoutine()">저장</button>

  </div>
</div>

<!-- INBODY MODAL -->
<div class="modal-overlay hidden" id="inbodyModal" onclick="if(event.target===this)closeInbodyModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 인바디 기록</div>

      <label class="form-label">측정 날짜</label>
      <input class="form-input" id="ibDate" type="date">

      <div class="form-group"><label class="form-label">체지방률 (%)</label><input class="form-input" id="ibFat" type="number" inputmode="decimal" step="0.1" placeholder="27.9"></div>
      <div class="form-group"><label class="form-label">근육량 (kg)</label><input class="form-input" id="ibMuscle" type="number" inputmode="decimal" step="0.1" placeholder="30.0"></div>
      <div class="form-group"><label class="form-label">체지방량 (kg)</label><input class="form-input" id="ibFatKg" type="number" inputmode="decimal" step="0.1" placeholder="21.7"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeInbodyModal()">취소</button>
      <button class="btn btn-primary" onclick="saveInbody()">저장</button>

    <div class="complete-stats" id="completeStats"></div>

  <div class="complete-sub" id="completeSub"></div>
  <button class="complete-btn" onclick="closeComplete()">확인 💪</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// ROUTINES DATA
// ═══════════════════════════════════════════
const ROUTINES_DEFAULT=[
  {id:'day1',name:'가슴 + 삼두',tag:'가슴',meta:'~70분 · 약 320kcal',tip:'슈퍼셋으로 심박수 유지. 세트 간 1분 이내 목표.',exercises:[
    {id:'w1',phase:'warmup',name:'러닝머신 빠른 걷기 or 제자리 뛰기',type:'timed',duration:300,focus:'심박수 115~120bpm 목표.',note:'워밍업 충분히 해야 관절 부상 예방'},

function todayStr(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fmtKo(str){
  if(!str)return'';
  const[y,m,d]=str.split('-');
  const days=['일','월','화','수','목','금','토'];
  return`${+m}월 ${+d}일 (${days[new Date(+y,+m-1,+d).getDay()]})`;
}
function getAllRoutines(){return[...ST.routines,...ST.customRoutines];}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
function isMonday(ds){const[y,m,d]=ds.split('-');return new Date(+y,+m-1,+d).getDay()===1;}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('fixedTimer').classList.toggle('visible',tab==='workout');
  if(tab==='workout')renderWorkoutArea();
  if(tab==='history')renderHistory();

}

// CALENDAR
// ═══════════════════════════════════════════
function renderCalendar(){
  const cm=ST.currentMonth,y=cm.getFullYear(),m=cm.getMonth();
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonth').textContent=`${y} ${months[m]}`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(l=>{
    const e=document.createElement('div');e.className='cal-day-label';e.textContent=l;grid.appendChild(e);
  });
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=todayStr();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const ds=`${y}-${p2(m+1)}-${p2(d)}`;
    const e=document.createElement('div');e.className='cal-day';
    const log=ST.logs[ds];const isDone=log&&log.done;const hasLog=!!log;
    e.innerHTML=`<span>${d}</span><div class="cal-day-dot" style="opacity:${hasLog?1:0}"></div>`;
    if(isDone)e.classList.add('done-workout');
    else if(ds===today)e.classList.add('today');
    if(ds===ST.selectedDate){e.classList.add('selected');if(isDone)e.classList.add('done-workout');}
    e.onclick=()=>selectDate(ds);
    grid.appendChild(e);
  }
}
function changeMonth(dir){const cm=ST.currentMonth;ST.currentMonth=new Date(cm.getFullYear(),cm.getMonth()+dir,1);renderCalendar();}
function selectDate(ds){
  ST.selectedDate=ds;
  const log=ST.logs[ds];
  ST.workoutState=log?log.workoutState||'idle':'idle';
  renderCalendar();renderRoutines();
}

function delRoutine(e,id){

  if(ST.activeRoutineId===id)ST.activeRoutineId=null;
  renderRoutines();
}

// PRE-EDIT DATA HELPERS
// ═══════════════════════════════════════════
function getPreEditData(routineId){
  // 루틴 원본에서 편집 데이터 초기화 (없으면)
  if(!ST.preEditData[routineId]){
    const r=getAllRoutines().find(x=>x.id===routineId);
    if(!r)return null;
    ST.preEditData[routineId]=r.exercises.map(ex=>{
      if(ex.type==='timed')return{...ex,done:false};
      return{...ex,sets:Array.from({length:ex.sets},()=>({weight:ex.weight,reps:ex.reps,done:false}))};
    });
  }
  return ST.preEditData[routineId];
}

function renderWorkoutArea(){
  const el=document.getElementById('workoutArea');
  const routine=getAllRoutines().find(r=>r.id===ST.activeRoutineId);
  if(!routine){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-text">홈 탭에서 루틴을 선택하거나<br>주간 분할 칩을 눌러주세요</div></div>`;
    return;
  }

  const log=ST.logs[ST.selectedDate];
  const ws=ST.workoutState; // idle | started | paused
  const isActive=(ws==='started'||ws==='paused')&&log&&log.routineId===routine.id;
  const isPaused=ws==='paused'&&isActive;

  // exData: 시작 후는 log, 시작 전은 preEdit
  let exData;
  if(isActive){
    exData=log.exercises;
  } else {
    exData=getPreEditData(routine.id);
  }

  // progress
  const sI=exData.filter(e=>e.type==='sets');
  const tI=exData.filter(e=>e.type==='timed');
  const total=sI.reduce((a,e)=>a+e.sets.length,0)+tI.length;
  const done=sI.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0)+tI.filter(e=>e.done).length;
  const pct=total>0?(done/total)*100:0;
  const allDone=total>0&&done===total;

  // ── Hero ──
  let html=`<div class="workout-hero">
    <div class="workout-hero-name">${routine.name}</div>
    <div class="workout-hero-date">${fmtKo(ST.selectedDate)}</div>
    <div class="workout-hero-meta">
      ${routine.meta?`<span class="hero-badge">⏱ ${routine.meta.split('·')[0]?.trim()}</span><span class="hero-badge">🔥 ${routine.meta.split('·')[1]?.trim()}</span>`:''}
    </div>
    ${routine.tip?`<div class="workout-tip">💡 ${routine.tip}</div>`:''}
    <div class="progress-section">
      <div class="progress-row"><span class="progress-label">진행률</span><span class="progress-val">${done} / ${total}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

  // ── 워크아웃 컨트롤 버튼 행 ──
  html+=`<div class="workout-ctrl-row">`;
  if(!isActive){
    // 시작 전
    html+=`<button class="wctrl-btn wctrl-start" id="btnStart">▶ 운동 시작</button>`;
  } else if(isPaused){
    // 일시정지 상태
    html+=`<button class="wctrl-btn wctrl-resume" id="btnResume">▶ 재개</button>`;
    html+=`<button class="wctrl-btn wctrl-stop" id="btnStop" style="flex:0.7;">■ 중지</button>`;
  } else if(allDone){
    // 모두 완료
    html+=`<button class="wctrl-btn wctrl-done" id="btnFinish">🏆 운동 완료!</button>`;
  } else {
    // 진행중
    html+=`<button class="wctrl-btn wctrl-pause" id="btnPause">⏸ 일시정지</button>`;
    html+=`<button class="wctrl-btn wctrl-stop" id="btnStop" style="flex:0.7;">■ 중지</button>`;
  }
  html+=`</div>`;

  if(isPaused){
    html+=`<div class="paused-banner">⏸ 일시정지 중 — 재개를 눌러 계속하세요</div>`;
  }

  html+=`</div>`; // /workout-hero

  // 시작 전 편집 안내 배너
  if(!isActive){
    html+=`<div class="pre-edit-banner">✏️ 시작 전에 무게·횟수·세트 수를 자유롭게 수정할 수 있어요</div>`;
  }

  // ── Exercises ──
  let curPhase=null;
  html+=`<div class="ex-cards" id="exCardsRoot">`;
  exData.forEach((ex,ei)=>{
    if(ex.phase!==curPhase){
      curPhase=ex.phase;
      const pi=PHASE_INFO[ex.phase]||{text:'',cls:''};
      if(pi.text)html+=`</div><div class="phase-lbl ${pi.cls}">${pi.text}</div><div class="ex-cards">`;
    }
    const isDone=ex.type==='sets'?ex.sets.every(s=>s.done):ex.done;
    html+=`<div class="ex-card ${isDone?'done-card':''}">
      <div class="ex-card-header">
        <div class="ex-card-top">
          <span class="ex-name">${ex.name}</span>
          ${isDone?'<span class="done-chip">✓ 완료</span>':''}
        </div>
        <div class="ex-meta">${ex.type==='sets'
          ?`${ex.sets[0]?.weight}kg × ${ex.sets[0]?.reps}회 × ${ex.sets.length}세트`
          :`⏱ ${Math.floor(ex.duration/60)}분${ex.duration%60?' '+ex.duration%60+'초':''}`}
        </div>
        ${ex.focus?`<div class="ex-focus"><span class="focus-icon">⭐</span><span class="focus-text">${ex.focus}</span></div>`:''}
        ${ex.note?`<div class="ex-note">📌 ${ex.note}</div>`:''}
      </div>`;

    if(ex.type==='timed'){
      html+=`<div class="timed-body">
        <div class="timed-info">목표: ${Math.floor(ex.duration/60)}분${ex.duration%60?' '+ex.duration%60+'초':''}</div>
        <button class="timed-check-btn${ex.done?' checked':''}" data-ei="${ei}" ${(!isActive||isPaused)?'disabled':''}>${ex.done?'✓ 완료':'완료 체크'}</button>
      </div>`;
    } else {
      // ★ 시작 전: 무게/횟수/세트삭제 편집 가능 / 시작 후: 완료 체크
      if(!isActive){
        // PRE-EDIT mode
        html+=`<div class="sets-body">
          <div class="sets-hd-pre"><span>세트</span><span>무게(kg)</span><span>횟수</span><span>세트목표</span><span>삭제</span></div>`;
        ex.sets.forEach((s,si)=>{
          html+=`<div class="pre-set-row">
            <div class="set-num">${si+1}</div>
            <input class="set-inp" type="number" inputmode="decimal" value="${s.weight}" data-ei="${ei}" data-si="${si}" data-field="weight" data-mode="pre">
            <input class="set-inp" type="number" inputmode="numeric" value="${s.reps}" data-ei="${ei}" data-si="${si}" data-field="reps" data-mode="pre">
            <div class="vol-cell" style="color:var(--primary);font-weight:800;">${si+1}세트</div>
            <button class="pre-del-btn" data-ei="${ei}" data-si="${si}">✕</button>
          </div>`;
        });
        html+=`<button class="add-set-btn pre-add-btn" data-ei="${ei}">+ 세트 추가</button>`;
        html+=`</div>`;
      } else {
        // ACTIVE mode
        html+=`<div class="sets-body">
          <div class="sets-hd"><span>세트</span><span>무게(kg)</span><span>횟수</span><span>볼륨</span><span>완료</span></div>`;
        ex.sets.forEach((s,si)=>{
          html+=`<div class="set-row${s.done?' done-set':''}">
            <div class="set-num">${si+1}</div>
            <input class="set-inp" type="number" inputmode="decimal" value="${s.weight}" ${s.done||isPaused?'disabled':''} data-ei="${ei}" data-si="${si}" data-field="weight" data-mode="active">
            <input class="set-inp" type="number" inputmode="numeric" value="${s.reps}" ${s.done||isPaused?'disabled':''} data-ei="${ei}" data-si="${si}" data-field="reps" data-mode="active">
            <div class="vol-cell">${(s.weight*s.reps)||0}</div>
            <button class="check-btn${s.done?' checked':''}" data-ei="${ei}" data-si="${si}" ${isPaused||s.done?'disabled':''}>${s.done?'✓':'○'}</button>
          </div>`;
        });
        if(!isDone&&!isPaused)html+=`<button class="add-set-btn active-add-btn" data-ei="${ei}">+ 세트 추가</button>`;
        html+=`</div>`;
      }
    }
    html+=`</div>`; // /ex-card
  });
  html+=`</div>`; // /ex-cards
  el.innerHTML=html;

  // ── Event Listeners ──
  // 시작
  const btnStart=el.querySelector('#btnStart');
  if(btnStart) btnStart.addEventListener('click',()=>startWorkout(JSON.parse(JSON.stringify(exData))));

  // 완료
  const btnFinish=el.querySelector('#btnFinish');
  if(btnFinish) btnFinish.addEventListener('click',finishWorkout);

  // 일시정지
  const btnPause=el.querySelector('#btnPause');
  if(btnPause) btnPause.addEventListener('click',pauseWorkout);

  // 재개
  const btnResume=el.querySelector('#btnResume');
  if(btnResume) btnResume.addEventListener('click',resumeWorkout);

  // 중지
  const btnStop=el.querySelector('#btnStop');
  if(btnStop) btnStop.addEventListener('click',stopWorkout);

  // Set inputs — PRE mode
  el.querySelectorAll('.set-inp[data-mode="pre"]').forEach(inp=>{
    inp.addEventListener('change',function(){
      const ei=+this.dataset.ei,si=+this.dataset.si,field=this.dataset.field;
      ST.preEditData[ST.activeRoutineId][ei].sets[si][field]=+this.value;
      // 메타 표시 업데이트만 (full re-render 없이)
      const metaEl=this.closest('.ex-card')?.querySelector('.ex-meta');
      if(metaEl){
        const sets=ST.preEditData[ST.activeRoutineId][ei].sets;
        metaEl.textContent=`${sets[0].weight}kg × ${sets[0].reps}회 × ${sets.length}세트`;
      }
    });
  });

  // Set inputs — ACTIVE mode
  el.querySelectorAll('.set-inp[data-mode="active"]').forEach(inp=>{
    inp.addEventListener('change',function(){
      updateSet(+this.dataset.ei,+this.dataset.si,this.dataset.field,this.value);
    });
  });

  // Check buttons
  el.querySelectorAll('.check-btn').forEach(btn=>{
    btn.addEventListener('click',function(){completeSet(+this.dataset.ei,+this.dataset.si);});
  });

  // Timed check
  el.querySelectorAll('.timed-check-btn').forEach(btn=>{
    btn.addEventListener('click',function(){completeTimed(+this.dataset.ei);});
  });

  // Pre: 세트 삭제
  el.querySelectorAll('.pre-del-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const ei=+this.dataset.ei,si=+this.dataset.si;
      const sets=ST.preEditData[ST.activeRoutineId][ei].sets;
      if(sets.length<=1){showToast('최소 1세트는 필요해요');return;}
      sets.splice(si,1);
      renderWorkoutArea();
    });
  });

  // Pre: 세트 추가
  el.querySelectorAll('.pre-add-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const ei=+this.dataset.ei;
      const sets=ST.preEditData[ST.activeRoutineId][ei].sets;
      const last=sets[sets.length-1];
      sets.push({weight:last.weight,reps:last.reps,done:false});
      renderWorkoutArea();
    });
  });

  // Active: 세트 추가
  el.querySelectorAll('.active-add-btn').forEach(btn=>{
    btn.addEventListener('click',function(){addSet(+this.dataset.ei);});
  });
}

// ── Workout lifecycle ──
function startWorkout(exData){
  const routine=getAllRoutines().find(r=>r.id===ST.activeRoutineId);
  if(!routine)return;
  ST.logs[ST.selectedDate]={
    routineId:routine.id,routineName:routine.name,
    startTime:Date.now(),done:false,workoutState:'started',
    exercises:exData,
  };
  ST.workoutState='started';
  renderCalendar();renderWorkoutArea();
  showToast('운동 시작! 파이팅 💪');
}
function pauseWorkout(){
  const log=ST.logs[ST.selectedDate];
  if(!log)return;
  ST.workoutState='paused';
  log.workoutState='paused';
  if(timerST.running){clearInterval(timerST.interval);timerST.running=false;updateTimerDisp();}
  renderWorkoutArea();
  showToast('⏸ 운동 일시정지');
}
function resumeWorkout(){
  const log=ST.logs[ST.selectedDate];
  if(!log)return;
  ST.workoutState='started';
  log.workoutState='started';
  renderWorkoutArea();
  showToast('▶ 운동 재개! 파이팅 💪');
}
function stopWorkout(){
  if(!confirm('운동을 중지하면 현재까지의 기록이 저장됩니다.\n중지하시겠습니까?'))return;
  const log=ST.logs[ST.selectedDate];
  if(log){log.workoutState='idle';log.endTime=Date.now();}
  ST.workoutState='idle';
  // preEdit 초기화 (다음에 다시 편집 가능)
  delete ST.preEditData[ST.activeRoutineId];
  renderCalendar();renderWorkoutArea();
  showToast('운동이 중지되었습니다');
}
function updateSet(ei,si,field,val){
  const log=ST.logs[ST.selectedDate];if(!log)return;
  log.exercises[ei].sets[si][field]=+val;
  renderWorkoutArea();
}
function completeSet(ei,si){
  const log=ST.logs[ST.selectedDate];if(!log)return;
  const was=log.exercises[ei].sets[si].done;
  log.exercises[ei].sets[si].done=!was;
  renderWorkoutArea();
  if(!was){resetTimer();startTimerAuto();showToast('세트 완료! 타이머 시작 ⏱');}
}
function completeTimed(ei){
  const log=ST.logs[ST.selectedDate];if(!log)return;
  log.exercises[ei].done=!log.exercises[ei].done;
  renderWorkoutArea();
}
function addSet(ei){
  const log=ST.logs[ST.selectedDate];if(!log)return;
  const l=log.exercises[ei].sets.slice(-1)[0];
  log.exercises[ei].sets.push({weight:l.weight,reps:l.reps,done:false});
  renderWorkoutArea();
}
function finishWorkout(){
  const log=ST.logs[ST.selectedDate];if(!log)return;
  log.done=true;log.endTime=Date.now();log.workoutState='idle';
  ST.workoutState='idle';
  delete ST.preEditData[ST.activeRoutineId];
  const dur=Math.round((log.endTime-log.startTime)/60000);
  const vol=log.exercises.filter(e=>e.type==='sets').reduce((a,e)=>a+e.sets.reduce((b,s)=>b+s.weight*s.reps,0),0);
  const sets=log.exercises.filter(e=>e.type==='sets').reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  document.getElementById('completeName').textContent=log.routineName;
  document.getElementById('completeStats').innerHTML=`
    <div class="cstat"><div class="cstat-val">${dur}</div><div class="cstat-label">분</div></div>
    <div class="cstat"><div class="cstat-val">${vol.toLocaleString()}</div><div class="cstat-label">kg 볼륨</div></div>
    <div class="cstat"><div class="cstat-val">${sets}</div><div class="cstat-label">세트</div></div>`;
  document.getElementById('completeSub').textContent='오늘도 체지방 감소에 한 걸음! 🔥';
  document.getElementById('completeOverlay').classList.remove('hidden');
  renderCalendar();
}
function closeComplete(){
  document.getElementById('completeOverlay').classList.add('hidden');
  renderWorkoutArea();
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function fmtTime(s){return`${p2(Math.floor(s/60))}:${p2(s%60)}`;}
function updateTimerDisp(){
  const el=document.getElementById('timerDisplay');
  el.textContent=fmtTime(timerST.remaining);
  el.className='timer-display';
  if(timerST.running)el.classList.add(timerST.remaining<=10?'warning':'running');
  else if(timerST.remaining===0)el.classList.add('done');
}
function toggleTimer(){
  if(timerST.running){
    clearInterval(timerST.interval);timerST.running=false;
    document.getElementById('timerToggleBtn').textContent='시작';
    document.getElementById('timerToggleBtn').className='t-btn t-btn-start';
  } else {
    if(timerST.remaining===0)timerST.remaining=timerST.total;
    startTimerAuto();
  }
  updateTimerDisp();
}
function startTimerAuto(){
  if(timerST.running)return;
  timerST.running=true;
  document.getElementById('timerToggleBtn').textContent='정지';
  document.getElementById('timerToggleBtn').className='t-btn t-btn-stop';
  timerST.interval=setInterval(()=>{
    if(timerST.remaining>0){timerST.remaining--;updateTimerDisp();}
    else{
      clearInterval(timerST.interval);timerST.running=false;
      document.getElementById('timerToggleBtn').textContent='시작';
      document.getElementById('timerToggleBtn').className='t-btn t-btn-start';
      updateTimerDisp();beep();
      showToast('휴식 종료! 다음 세트 🚀');
    }
  },1000);
}
function resetTimer(){
  clearInterval(timerST.interval);timerST.running=false;timerST.remaining=timerST.total;
  document.getElementById('timerToggleBtn').textContent='시작';
  document.getElementById('timerToggleBtn').className='t-btn t-btn-start';
  updateTimerDisp();
}
function setPreset(sec){
  clearInterval(timerST.interval);timerST.running=false;timerST.total=timerST.remaining=sec;
  document.getElementById('timerToggleBtn').textContent='시작';
  document.getElementById('timerToggleBtn').className='t-btn t-btn-start';
  document.getElementById('customTimeInp').value='';
  document.querySelectorAll('.preset-chip').forEach(b=>b.classList.remove('active'));
  updateTimerDisp();
}
function setCustomTime(val){
  const p=val.split(':');let sec=p.length===2?(+p[0])*60+(+p[1]):(+val)*60;
  if(sec>0){
    clearInterval(timerST.interval);timerST.running=false;timerST.total=timerST.remaining=sec;
    document.querySelectorAll('.preset-chip').forEach(b=>b.classList.remove('active'));
    updateTimerDisp();
  }
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.2,0.4].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.15);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.15);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════
// HISTORY — ★ 볼륨/삭제 겹침 수정
// ═══════════════════════════════════════════
function renderHistory(){
  const el=document.getElementById('historyList');
  const logs=Object.entries(ST.logs).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!logs.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">아직 운동 기록이 없어요<br>첫 운동을 시작해 보세요!</div></div>`;
    return;
  }
  el.innerHTML=logs.map(([date,log])=>{
    const vol=log.exercises.filter(e=>e.type==='sets').reduce((a,e)=>a+e.sets.reduce((b,s)=>b+s.weight*s.reps,0),0);
    const done=log.exercises.filter(e=>e.type==='sets').reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
    const total=log.exercises.filter(e=>e.type==='sets').reduce((a,e)=>a+e.sets.length,0);
    const dur=log.endTime?Math.round((log.endTime-log.startTime)/60000):'진행중';
    return`<div class="history-card ${log.done?'full-done':''}">
      <div class="history-top">
        <div class="history-top-left">
          <div class="history-name">${log.routineName}${log.done?' ✅':''}</div>
          <div class="history-meta">${fmtKo(date)} · ${dur}분</div>
        </div>
        <div class="history-top-right">
          <div class="history-vol">${vol.toLocaleString()}kg</div>
          <div class="history-sets">${done}/${total} 세트</div>
          <button class="history-del-btn" onclick="delLog('${date}')">🗑 삭제</button>
        </div>
      </div>
      <div class="history-tags">
        ${log.exercises.filter(e=>e.phase==='main').slice(0,5).map(ex=>`<span class="history-tag">${ex.name}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function delLog(date){
  if(!confirm(`${fmtKo(date)} 기록을 삭제할까요?`))return;
  delete ST.logs[date];
  renderHistory();renderCalendar();
  showToast('기록이 삭제됐습니다');
}

// ═══════════════════════════════════════════
// INBODY
// ═══════════════════════════════════════════
function renderInbodyPage(){
  const logs=ST.inbodyLogs;
  const latest=logs.length?logs[logs.length-1]:null;
  const prev=logs.length>1?logs[logs.length-2]:null;
  const rem=document.getElementById('inbodyReminder');
  const today=todayStr();
  if(isMonday(today)&&!logs.some(l=>l.date===today))rem.style.display='flex';
  else rem.style.display='none';
  if(latest){
    document.getElementById('hWeight').textContent=latest.weight+'kg';
    document.getElementById('hFat').textContent=latest.fat+'%';
    document.getElementById('hMuscle').textContent=latest.muscle+'kg';
  }
  const summaryEl=document.getElementById('inbodySummary');
  if(!latest){summaryEl.innerHTML='<div style="padding:12px 14px;color:var(--text3);font-size:12px;font-weight:700;grid-column:span 2;">기록이 없습니다. + 기록 버튼을 눌러주세요.</div>';return;}
  function chg(cur,prv,reverse){
    if(!prv)return'<span class="ib-stat-change neu">첫 기록</span>';
    const d=(cur-prv).toFixed(1);const down=d<0;const good=reverse?down:!down;
    const cls=d==0?'neu':good?'pos':'neg';
    return`<span class="ib-stat-change ${cls}">${d>0?'+':''}${d} ${d==0?'—':d<0?'▼':'▲'}</span>`;
  }
  const cards=[
    {label:'체중',val:latest.weight,unit:'kg',prev:prev?.weight,reverse:true,color:'var(--primary)'},
    {label:'체지방률',val:latest.fat,unit:'%',prev:prev?.fat,reverse:true,color:'var(--orange)'},
    {label:'근육량',val:latest.muscle,unit:'kg',prev:prev?.muscle,reverse:false,color:'var(--blue)'},
    {label:'체지방량',val:latest.fatKg,unit:'kg',prev:prev?.fatKg,reverse:true,color:'var(--green)'},
  ];
  summaryEl.innerHTML=cards.map(c=>`
    <div class="ib-stat-card">
      <div class="ib-stat-label">${c.label}</div>
      <div class="ib-stat-val" style="color:${c.color};">${c.val}<span class="ib-stat-unit"> ${c.unit}</span></div>
      ${chg(c.val,c.prev,c.reverse)}
    </div>`).join('');
  document.getElementById('inbodyLogList').innerHTML=[...ST.inbodyLogs].reverse().map((l,ri)=>{
    const realIdx=ST.inbodyLogs.length-1-ri;
    return`<div class="inbody-log-card">
      <button class="inbody-log-del" onclick="delInbody(${realIdx})">✕</button>
      <div class="inbody-log-date">${fmtKo(l.date)}</div>
      <div class="inbody-log-row">
        <div class="inbody-log-item"><div class="ilog-label">체중</div><div class="ilog-val" style="color:var(--primary)">${l.weight}kg</div></div>
        <div class="inbody-log-item"><div class="ilog-label">체지방%</div><div class="ilog-val" style="color:var(--orange)">${l.fat}%</div></div>
        <div class="inbody-log-item"><div class="ilog-label">근육량</div><div class="ilog-val" style="color:var(--blue)">${l.muscle}kg</div></div>
        <div class="inbody-log-item"><div class="ilog-label">체지방량</div><div class="ilog-val" style="color:var(--green)">${l.fatKg}kg</div></div>
      </div>
    </div>`;
  }).join('');
}
function delInbody(idx){
  if(!confirm('인바디 기록을 삭제할까요?'))return;
  ST.inbodyLogs.splice(idx,1);renderInbodyPage();renderInbodyChart();
  showToast('기록이 삭제됐습니다');
}
function switchChart(metric,btn){
  ST.currentChartMetric=metric;
  document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderInbodyChart();
}
function renderInbodyChart(){
  const canvas=document.getElementById('inbodyChart');
  const emptyEl=document.getElementById('chartEmpty');
  const logs=ST.inbodyLogs;
  if(logs.length<2){canvas.style.display='none';emptyEl.style.display='block';return;}
  canvas.style.display='block';emptyEl.style.display='none';
  const metric=ST.currentChartMetric;
  const colorMap={weight:'#5B6EF5',fat:'#FF7043',muscle:'#3B82F6',fatkg:'#22C55E'};
  const lineColor=colorMap[metric];
  const data=logs.map(l=>({label:l.date.slice(5),val:metric==='weight'?l.weight:metric==='fat'?l.fat:metric==='muscle'?l.muscle:l.fatKg}));
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-28;const H=180;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={top:16,right:16,bottom:36,left:44};
  const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const vals=data.map(d=>d.val);const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=maxV-minV||1;const vMin=minV-range*0.15;const vMax=maxV+range*0.15;
  function xP(i){return pad.left+i*(cw/(data.length-1));}
  function yP(v){return pad.top+ch-(((v-vMin)/(vMax-vMin))*ch);}
  ctx.strokeStyle='#E4E8F7';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.top+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    const v=(vMax-(vMax-vMin)/4*i).toFixed(1);
    ctx.fillStyle='#9CA3AF';ctx.font=`bold 10px DM Mono,monospace`;ctx.textAlign='right';ctx.fillText(v,pad.left-6,y+4);
  }
  const grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
  grad.addColorStop(0,lineColor+'55');grad.addColorStop(1,lineColor+'05');
  ctx.beginPath();data.forEach((d,i)=>{if(i===0)ctx.moveTo(xP(i),yP(d.val));else ctx.lineTo(xP(i),yP(d.val));});
  ctx.lineTo(xP(data.length-1),H-pad.bottom);ctx.lineTo(xP(0),H-pad.bottom);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  data.forEach((d,i)=>{if(i===0)ctx.moveTo(xP(i),yP(d.val));else ctx.lineTo(xP(i),yP(d.val));});
  ctx.stroke();
  data.forEach((d,i)=>{
    const x=xP(i),y=yP(d.val);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.fill();ctx.stroke();
    ctx.fillStyle=lineColor;ctx.font=`bold 10px DM Mono,monospace`;ctx.textAlign='center';ctx.fillText(d.val,x,y-9);
    ctx.fillStyle='#9CA3AF';ctx.font=`bold 9px Nunito,sans-serif`;ctx.fillText(d.label,x,H-pad.bottom+14);
  });
}
function openInbodyModal(){
  document.getElementById('ibDate').value=todayStr();
  document.getElementById('ibWeight').value='';
  document.getElementById('ibFat').value='';
  document.getElementById('ibMuscle').value='';
  document.getElementById('ibFatKg').value='';
  document.getElementById('inbodyModal').classList.remove('hidden');
}
function closeInbodyModal(){document.getElementById('inbodyModal').classList.add('hidden');}
function saveInbody(){
  const date=document.getElementById('ibDate').value;
  const weight=parseFloat(document.getElementById('ibWeight').value);
  const fat=parseFloat(document.getElementById('ibFat').value);
  const muscle=parseFloat(document.getElementById('ibMuscle').value);
  const fatKg=parseFloat(document.getElementById('ibFatKg').value);
  if(!date||isNaN(weight)||isNaN(fat)||isNaN(muscle)||isNaN(fatKg)){alert('모든 항목을 입력해 주세요.');return;}
  const idx=ST.inbodyLogs.findIndex(l=>l.date===date);
  const entry={date,weight,fat,muscle,fatKg};
  if(idx>=0)ST.inbodyLogs[idx]=entry;else ST.inbodyLogs.push(entry);
  ST.inbodyLogs.sort((a,b)=>a.date.localeCompare(b.date));
  closeInbodyModal();renderInbodyPage();renderInbodyChart();
  showToast('인바디 기록이 저장됐습니다 📊');
}

function openRoutineModal(){
  document.getElementById('routineName').value='';
  document.querySelectorAll('.tag-chip').forEach((c,i)=>c.classList.toggle('sel',i===0));
  document.getElementById('exInputList').innerHTML='';
  addExInput();addExInput();addExInput();
  document.getElementById('routineModal').classList.remove('hidden');
}
function closeRoutineModal(){document.getElementById('routineModal').classList.add('hidden');}
function toggleTag(el){document.querySelectorAll('.tag-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}
function addExInput(){
  const list=document.getElementById('exInputList');
  const row=document.createElement('div');row.className='ex-input-row';
  row.innerHTML=`<input class="form-input mini-inp ex-name" placeholder="종목명" style="font-size:12px;padding:8px 7px;">
    <input class="form-input mini-inp ex-weight" type="number" inputmode="decimal" placeholder="무게" style="font-size:12px;padding:8px 3px;text-align:center;">
    <input class="form-input mini-inp ex-reps" type="number" inputmode="numeric" placeholder="횟수" style="font-size:12px;padding:8px 3px;text-align:center;">
    <input class="form-input mini-inp ex-sets" type="number" inputmode="numeric" placeholder="세트" style="font-size:12px;padding:8px 3px;text-align:center;">
    <button class="del-row-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}
function saveRoutine(){
  const name=document.getElementById('routineName').value.trim();
  if(!name){alert('루틴 이름을 입력하세요.');return;}
  const tag=document.querySelector('.tag-chip.sel')?.dataset.tag||'기타';
  const rows=document.querySelectorAll('#exInputList .ex-input-row');
  const exercises=[];
  rows.forEach(row=>{
    const n=row.querySelector('.ex-name').value.trim();
    const w=+row.querySelector('.ex-weight').value||0;
    const r=+row.querySelector('.ex-reps').value||10;
    const s=+row.querySelector('.ex-sets').value||3;
    if(n)exercises.push({id:'ce'+Date.now()+Math.random(),name:n,phase:'main',type:'sets',weight:w,reps:r,sets:s,focus:'',note:''});
  });
  if(!exercises.length){alert('종목을 1개 이상 추가하세요.');return;}
  ST.customRoutines.push({id:'cr'+Date.now(),name,tag,exercises});
  closeRoutineModal();renderRoutines();
  showToast('루틴이 추가됐습니다! 👍');
}

}
